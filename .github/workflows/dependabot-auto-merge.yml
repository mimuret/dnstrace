name: Dependabot Auto Merge

on:
  workflow_run:
    workflows:
      - Go Test
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Merge Dependabot PR when checks are green
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prs = context.payload.workflow_run.pull_requests || [];
            if (prs.length === 0) {
              core.info('No pull request associated with this workflow run.');
              return;
            }

            const prNumber = prs[0].number;
            const { owner, repo } = context.repo;

            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
            });

            if (pr.user.login !== 'dependabot[bot]') {
              core.info(`Skip PR #${prNumber}: author is ${pr.user.login}`);
              return;
            }

            if (pr.state !== 'open') {
              core.info(`Skip PR #${prNumber}: state is ${pr.state}`);
              return;
            }

            try {
              await github.rest.pulls.merge({
                owner,
                repo,
                pull_number: prNumber,
                merge_method: 'squash',
              });
              core.info(`Merged Dependabot PR #${prNumber}`);
            } catch (error) {
              core.setFailed(`Failed to merge PR #${prNumber}: ${error.message}`);
            }
